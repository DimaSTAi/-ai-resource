  <!DOCTYPE html>
  <html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо! — AI Resource</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #0A0A0F;
        color: #FFFFFF;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
      .box {
        max-width: 500px;
        padding: 40px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(108,99,255,0.3);
        border-radius: 16px;
      }
      h1 {
        font-family: 'Montserrat', sans-serif;
        font-size: 2rem;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #6C63FF, #00D4FF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        color: #8B8FA8;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        padding: 14px 32px;
        background: linear-gradient(135deg, #6C63FF, #00D4FF);
        color: #fff;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 600;
      }
      a:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Спасибо за заявку!</h1>
      <p>Мы получили ваше сообщение и свяжемся с вами в течение 1 часа. Пока можно вернуться на сайт.</p>
      <a href="index.html">← Вернуться на сайт</a>
    </div>
  </body>
  </html>
